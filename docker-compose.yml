services:

  # ─────────────────────────────────────────
  #  BACKEND  –  FastAPI + SQLAlchemy + SQLite
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdis_backend
    restart: unless-stopped
    env_file:
      # Secretos/config (SECRET_KEY, DEEPGRAM_API_KEY, AUDIO_DIR). Está gitignored.
      - ./backend/.env
    environment:
      # SQLite en un volumen persistente (sobreescribe el DATABASE_URL del .env)
      DATABASE_URL: sqlite:////app/db/plataforma_bogota.db
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    volumes:
      - ./backend:/app
      # BD SQLite persistente fuera del contenedor (sobrevive a reconstrucciones)
      - sqlite_data:/app/db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  #  FRONTEND  –  React 19 + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sdis_frontend
    restart: unless-stopped
    environment:
      # El proxy de Vite (dentro del contenedor) reenvía /api → servicio backend
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  sqlite_data: